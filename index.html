<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兑换码兑换系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .code-input {
            letter-spacing: 0.3em;
            font-family: 'Courier New', monospace;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- 密码验证代码 -->
    <script>
        const CORRECT_PASSWORD = "24140756"; // 密
        let userInput = prompt("请输入访问密码：");
        if (userInput !== CORRECT_PASSWORD) {
            alert("密码错误，无法访问！");
            document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50px;'>访问被拒绝</h1>";
        }
    </script>

    <!-- 页面主体内容 -->
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md rounded-2xl shadow-2xl p-8 animate-fade-in">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">兑换码系统</h2>
                <p class="text-gray-600">请输入你的密钥</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密钥</label>
                    <input 
                        type="text" 
                        id="codeInput" 
                        class="code-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all uppercase"
                        placeholder="请输入8位密钥"
                        maxlength="8"
                    >
                </div>
                
                <button 
                    onclick="redeemCode()"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition-all transform hover:scale-105 active:scale-95 shadow-lg"
                >
                    立即兑换
                </button>
                
                <div id="result" class="mt-6 hidden">
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                        <div class="flex items-center">
                            <svg class="w-6 h-6 text-green-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                            <div>
                                <p class="text-green-800 font-semibold" id="statusText">兑换成功！</p>
                                <p class="text-sm text-green-600 mt-1" id="rewardText">获得奖励：VIP会员30天</p>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-center" id="qrcode"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟有效兑换码
        const validCodes = {
            "VIP202401": { name: "VIP会员30天", type: "membership" },
            "COIN10000": { name: "游戏币10000", type: "currency" },
            "SKIN202401": { name: "限定皮肤", type: "item" }
        };

        function redeemCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            const statusText = document.getElementById('statusText');
            const rewardText = document.getElementById('rewardText');
            const qrcodeDiv = document.getElementById('qrcode');

            if (code.length !== 8) {
                alert("请输入8位密钥！");
                return;
            }

            if (validCodes[code]) {
                const reward = validCodes[code];
                statusText.textContent = "兑换成功！";
                rewardText.textContent = `获得奖励：${reward.name}`;
                
                // 生成二维码
                qrcodeDiv.innerHTML = "";
                new QRCode(qrcodeDiv, {
                    text: `redeem:${code}:${Date.now()}`,
                    width: 128,
                    height: 128
                });
                
                resultDiv.classList.remove('hidden');
                resultDiv.classList.add('animate-fade-in');
                document.getElementById('codeInput').value = "";
            } else {
                alert("密钥无效或已过期！");
                resultDiv.classList.add('hidden');
            }
        }

        // 回车触发兑换
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                redeemCode();
            }
        });
    </script>
</body>
</html>
