<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免扫地卡管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0066ff 0%, #3399ff 100%);
            background-attachment: fixed;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: transparent;
            color: white;
            padding: 20px;
        }
        #main-content {
            display: none;
            padding: 20px;
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        .tab-btn {
            padding: 10px 20px;
            border-radius: 999px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            cursor: pointer;
        }
        .tab-btn.active {
            background: white;
            color: #0066ff;
            box-shadow: 0 4px 12px rgba(0,102,255,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0066ff, #3399ff);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid #cce0ff;
            border-radius: 12px;
            text-align: center;
            outline: none;
            background: #fff;
            z-index: 1;
        }
        .input-field:focus {
            border-color: #0066ff;
        }
        .edit-btn {
            color: #0066ff;
            font-size: 14px;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<!-- 登录页 -->
<div id="auth-screen">
    <div class="glass-card text-center">
        <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-blue-600 to-sky-400 flex items-center justify-center text-white text-2xl">🔒</div>
        <h2 class="text-xl font-bold text-gray-800 mt-4 mb-2">访问验证</h2>
        <p class="text-gray-500 text-sm mb-6">请输入密钥进入系统</p>
        <input type="password" id="secret-input" placeholder="输入密钥" class="input-field mb-4">
        <button onclick="checkSecret()" class="btn-primary">进入系统</button>
        <div id="errTip" class="text-red-500 text-sm mt-3 hidden">密钥错误，请重试</div>
    </div>
</div>

<!-- 主页面 -->
<div id="main-content" class="max-w-5xl mx-auto">
    <div class="text-center text-white mt-6 mb-8">
        <div class="text-5xl mb-2">🎁</div>
        <h1 class="text-3xl font-bold">免扫地卡管理系统</h1>
        <p class="opacity-80 mt-2">生成 · 兑换 · 记录管理</p>
    </div>

    <div class="flex justify-center mb-8">
        <div class="bg-white/15 rounded-full p-1 flex gap-1">
            <button onclick="switchTab('redeem')" class="tab-btn active" data-tab="redeem">兑换码兑换</button>
            <button onclick="switchTab('generate')" class="tab-btn" data-tab="generate">生成兑换码</button>
            <button onclick="switchTab('records')" class="tab-btn" data-tab="records">兑换记录</button>
        </div>
    </div>

    <!-- 兑换面板（不填备注） -->
    <div id="tab-redeem" class="glass-card p-6 max-w-md mx-auto">
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto rounded-full bg-gradient-to-br from-blue-600 to-sky-400 flex items-center justify-center text-white text-2xl">🎫</div>
            <h2 class="text-xl font-bold text-gray-800 mt-3">输入兑换码</h2>
        </div>
        <input type="text" id="redeemCode" placeholder="XXXX-XXXX-XXXX" maxlength="14" class="input-field mb-4 uppercase">
        <button onclick="doRedeem()" class="btn-primary">立即兑换</button>
        <div id="resTip" class="mt-4 text-center hidden rounded-lg py-2"></div>
    </div>

    <!-- 生成面板：二维码下方直接显示兑换码 -->
    <div id="tab-generate" class="glass-card p-6 max-w-3xl mx-auto hidden">
        <h2 class="text-xl font-bold text-gray-800 text-center mb-6">生成新兑换码</h2>
        <div class="space-y-4">
            <input type="text" id="rewardTxt" placeholder="奖励内容" class="input-field">
            <input type="number" id="genNum" value="1" min="1" max="20" class="input-field">
            <button onclick="createCode()" class="btn-primary">一键生成</button>
        </div>
        <div id="qrBox" class="bg-gray-50 rounded-lg p-4 min-h-[280px] mt-4">
            <div class="grid grid-cols-2 gap-4" id="qrGrid"></div>
        </div>
        <div id="codeList" class="mt-4"></div>
    </div>

    <!-- 记录面板：全部都可以编辑备注 -->
    <div id="tab-records" class="glass-card p-6 max-w-4xl mx-auto hidden">
        <h2 class="text-xl font-bold text-gray-800 mb-4">兑换记录（可随时修改备注）</h2>
        <div id="recordBody" class="text-sm"></div>
        <div id="emptyTxt" class="text-center text-gray-400 py-8">暂无数据</div>
    </div>
</div>

<!-- 二维码弹窗 -->
<div id="qrModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-5 w-full max-w-sm text-center">
        <div id="modalQr"></div>
        <p id="modalCode" class="font-mono text-blue-600 my-3"></p>
        <div class="flex gap-2">
            <button onclick="copyNow()" class="flex-1 bg-blue-500 text-white py-2 rounded-lg">复制</button>
            <button onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">关闭</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('codeData')) || {};
    let nowCode = "";
    const pwd = "2414777";

    function checkSecret(){
        let v = document.getElementById('secret-input').value.trim();
        if(v === pwd){
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            checkUrlCode();
        }else{
            document.getElementById('errTip').classList.remove('hidden');
        }
    }
    function save(){
        localStorage.setItem('codeData',JSON.stringify(data));
    }

    function switchTab(n){
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+n).classList.remove('hidden');
        document.querySelector(`.tab-btn[data-tab="${n}"]`).classList.add('active');
        if(n==='records') showRecord();
    }

    function randomCode(){
        let s='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';
        for(let i=0;i<12;i++){
            if(i&&i%4===0) r+='-';
            r+=s[Math.floor(Math.random()*s.length)];
        }
        return r;
    }

    function createCode(){
        let w = document.getElementById('rewardTxt').value.trim();
        let n = +document.getElementById('genNum').value;
        if(!w) return alert('填写奖励内容');
        let qrGrid = document.getElementById('qrGrid');
        let listWrap = document.getElementById('codeList');
        qrGrid.innerHTML='';
        listWrap.innerHTML='';

        for(let i=0;i<n;i++){
            let c;
            do c=randomCode();while(data[c]);
            data[c]={reward:w,used:false,time:'',remark:''};
            save();

            let qrItem = document.createElement('div');
            qrItem.className='text-center';
            let d = document.createElement('div');
            new QRCode(d,{text:location.origin+location.pathname+'?code='+c,width:100,height:100});
            qrItem.appendChild(d);
            let txt=document.createElement('div');
            txt.className='mt-1 text-sm font-mono text-blue-600';
            txt.textContent=c;
            qrItem.appendChild(txt);
            qrItem.onclick=()=>openQr(c);
            qrGrid.appendChild(qrItem);

            let item = document.createElement('div');
            item.className='p-2 bg-gray-50 rounded flex justify-between mt-1';
            item.innerHTML = `<span class="font-mono text-sm">${c}</span><button onclick="copyTxt('${c}')" class="text-blue-500">复制</button>`;
            listWrap.appendChild(item);
        }
        alert('生成完成');
    }

    function doRedeem(){
        let input = document.getElementById('redeemCode').value.toUpperCase().replace(/-/g,'');
        if(input.length!==12) return tip('格式错误','red');
        let code = input.replace(/(\w{4})(\w{4})(\w{4})/,'$1-$2-$3');
        if(!data[code]) return tip('无效兑换码','red');
        if(data[code].used) return tip('已使用','red');

        // 兑换时不填备注，直接标记已使用
        data[code].used=true;
        data[code].time=new Date().toLocaleString();
        save();
        tip('兑换成功 🎉','green');
        document.getElementById('redeemCode').value='';
    }

    function tip(txt,color){
        let el = document.getElementById('resTip');
        el.classList.remove('hidden','bg-green-100','text-green-700','bg-red-100','text-red-700');
        if(color==='green'){
            el.className='mt-4 text-center rounded-lg py-2 bg-green-100 text-green-700';
        }else{
            el.className='mt-4 text-center rounded-lg py-2 bg-red-100 text-red-700';
        }
        el.innerText=txt;
        el.classList.remove('hidden');
        setTimeout(()=>el.classList.add('hidden'),3000);
    }

    // 所有记录 不管未使用/已使用 都能改备注
    function showRecord(){
        let wrap = document.getElementById('recordBody');
        let empty = document.getElementById('emptyTxt');
        wrap.innerHTML='';
        let arr = Object.entries(data);
        if(!arr.length){empty.classList.remove('hidden');return;}
        empty.classList.add('hidden');

        arr.forEach(([c,d])=>{
            let status = d.used ? '<span class="text-red-600">已使用</span>' : '<span class="text-green-600">未使用</span>';
            let timeStr = d.time || '无';
            let dom = document.createElement('div');
            dom.className='p-3 border-b border-gray-100';
            dom.innerHTML=`
                <div>兑换码：${c}</div>
                <div>奖励：${d.reward}</div>
                <div>状态：${status}</div>
                <div>使用时间：${timeStr}</div>
                <div>
                    备注：<span id="rem_${c}">${d.remark||'暂无备注'}</span>
                    <span class="edit-btn" onclick="editRemark('${c}')">编辑备注</span>
                </div>
            `;
            wrap.appendChild(dom);
        })
    }

    // 修改备注弹窗，随便改、多次改
    function editRemark(code){
        let oldText = data[code].remark || '';
        let newRem = prompt('修改备注', oldText);
        if(newRem !== null){
            data[code].remark = newRem;
            save();
            showRecord();
        }
    }

    function openQr(c){
        nowCode=c;
        let m = document.getElementById('qrModal');
        let q = document.getElementById('modalQr');
        q.innerHTML='';
        new QRCode(q,{text:location.origin+location.pathname+'?code='+c,width:160,height:160});
        document.getElementById('modalCode').innerText=c;
        m.classList.remove('hidden');
    }
    function closeModal(){document.getElementById('qrModal').classList.add('hidden');}
    function copyTxt(c){navigator.clipboard.writeText(c).then(()=>alert('已复制'));}
    function copyNow(){copyTxt(nowCode);}

    function checkUrlCode(){
        let u = new URLSearchParams(location.search).get('code');
        if(u){
            switchTab('redeem');
            document.getElementById('redeemCode').value=u.toUpperCase();
        }
    }
</script>
</body>
</html>
